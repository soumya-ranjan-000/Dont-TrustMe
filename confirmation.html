<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Booking Confirmed</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;600;800&family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css" />
    <style>
      .confirm-card{padding:3rem 0;text-align:center}
      .confirm-box{background:#fff;padding:28px;border-radius:12px;max-width:720px;margin:0 auto}
    </style>
  </head>
  <body>
    <header class="site-header">
      <div class="container header-inner">
        <div class="brand">HOTEL</div>
        <nav class="main-nav"><a href="index.html">Home</a></nav>
      </div>
    </header>

    <main class="container confirm-card">
      <div class="confirm-box" id="confirmBox">
        <h2>Booking confirmation</h2>
        <p id="msg">Loading...</p>
      </div>
    </main>

    <footer class="site-footer">
      <div class="container footer-inner"><div class="links"><a href="index.html">Home</a></div><div class="big-word">HOTEL</div></div>
    </footer>

    <script>
      async function load(){
        const raw = sessionStorage.getItem('lastBooking');
        const qs = new URLSearchParams(location.search);
        const ref = qs.get('ref');
        if(raw){
          const b = JSON.parse(raw);
          document.getElementById('msg').innerHTML = `
            <strong>Reservation ID:</strong> ${b.id}<br/>
            <strong>Name:</strong> ${b.name}<br/>
            <strong>Room:</strong> ${b.roomName}<br/>
            <strong>Dates:</strong> ${b.checkin} → ${b.checkout}<br/>
            <p style="margin-top:12px">A confirmation email has been sent to <strong>${b.email}</strong> (mock).</p>
            <p><a class="btn" href="index.html">Back to Home</a></p>
          `;
        } else if(ref){
          document.getElementById('msg').textContent = 'Booking ' + ref + ' confirmed. (session data not available)';
        } else {
          document.getElementById('msg').textContent = 'No booking information found.';
        }
      }
      load();
    </script>
  </body>
</html>
